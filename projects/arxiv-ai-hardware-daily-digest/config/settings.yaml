# Arxiv AI硬件加速论文日报系统 - 生产配置
# 生成时间: 2026-03-16 19:24

arxiv:
  # Arxiv API配置
  base_url: "http://export.arxiv.org/api/query"
  
  # 关注的论文类别
  categories:
    - "cs.AR"    # 计算机体系结构
    - "cs.AI"    # 人工智能
    - "cs.LG"    # 机器学习
  
  # 关键词配置
  keywords:
    hardware:
      - "quantization"
      - "sparsity"
      - "LLM hardware"
      - "AI accelerator"
      - "3D PIM"
      - "processing-in-memory"
      - "TPU"
      - "GPU"
      - "FPGA"
      - "ASIC"
    
    techniques:
      - "model compression"
      - "pruning"
      - "knowledge distillation"
      - "low-precision"
      - "neural architecture search"
      - "hardware-aware training"
  
  # 查询参数
  max_results: 50      # 最大获取论文数
  days_back: 2         # 查询最近几天的论文

filter:
  # 质量筛选配置
  quality_threshold: 0.65    # 质量阈值 (0-1)
  min_papers_per_day: 3      # 每天最少论文数
  max_papers_per_day: 12     # 每天最多论文数
  
  # 评分权重
  scoring_weights:
    keyword_match: 0.4      # 关键词匹配
    author_reputation: 0.3  # 作者声誉
    recency: 0.2           # 新鲜度
    content_quality: 0.1    # 内容质量
  
  # 知名机构列表（用于声誉评分）
  reputable_institutions:
    - "MIT"
    - "Stanford"
    - "UC Berkeley"
    - "CMU"
    - "Google"
    - "Microsoft"
    - "Meta"
    - "NVIDIA"
    - "Intel"
    - "AMD"
    - "Apple"
    - "Amazon"
    - "Tencent"
    - "Alibaba"
    - "Baidu"

feishu:
  # 🚨 重要：请替换为你的真实飞书应用凭证 🚨
  app_id: "YOUR_APP_ID_HERE"           # 格式如: cli_xxxxxxxx
  app_secret: "YOUR_APP_SECRET_HERE"   # 你的App Secret
  
  # 文档配置
  document_folder: "AI论文日报"         # 飞书中的文件夹名称
  document_title: "AI硬件加速论文日报 - {date}"  # 文档标题模板
  
  # 通知配置（可选）
  webhook_url: ""  # 飞书群机器人webhook URL，用于发送通知

schedule:
  # 执行计划
  cron: "0 8 * * *"          # 每天上午8点执行（北京时间）
  timezone: "Asia/Shanghai"  # 时区
  
  # 通知设置
  notifications:
    on_success: true    # 成功时发送通知
    on_failure: true    # 失败时发送通知

logging:
  # 日志配置
  level: "INFO"        # 日志级别: DEBUG, INFO, WARNING, ERROR
  format: "json"       # 日志格式: json, text
  file: "logs/arxiv_digest.log"  # 日志文件路径
  max_size_mb: 10      # 最大日志文件大小（MB）
  backup_count: 5      # 保留的日志文件数量

debug:
  # 调试配置
  enabled: false       # 启用调试模式
  dry_run: false       # 干运行模式（不实际创建文档）
  
  # 模拟模式设置
  mock_feishu: false   # 使用模拟飞书客户端（测试用）
  mock_arxiv: false    # 使用模拟Arxiv数据（测试用）

# 高级配置（一般无需修改）
advanced:
  # 网络设置
  request_timeout: 30      # API请求超时时间（秒）
  max_retries: 3           # 最大重试次数
  retry_delay: 5           # 重试延迟（秒）
  
  # 性能优化
  batch_size: 10           # 批量处理大小
  cache_enabled: true      # 启用缓存
  cache_ttl: 3600          # 缓存有效期（秒）
  
  # 安全设置
  ssl_verify: true         # 验证SSL证书
  rate_limit: 10           # 速率限制（请求/秒）