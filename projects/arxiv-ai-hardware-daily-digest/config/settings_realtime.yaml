# 实时最新论文配置 - 2026-03-16
arxiv:
  base_url: "http://export.arxiv.org/api/query"
  
  # 获取最近1天的论文（最新）
  days_back: 1
  max_results: 50
  
  # 关注类别
  categories:
    - "cs.AR"    # 计算机体系结构
    - "cs.AI"    # 人工智能
    - "cs.LG"    # 机器学习
  
  # 硬件加速关键词
  keywords:
    hardware:
      - "quantization"
      - "sparsity"
      - "accelerator"
      - "TPU"
      - "GPU"
      - "FPGA"
      - "ASIC"
      - "PIM"
      - "processing-in-memory"
      - "3D"
      - "edge"
    
    techniques:
      - "model compression"
      - "pruning"
      - "knowledge distillation"
      - "low-precision"
      - "mixed-precision"
      - "neural architecture search"
      - "hardware-aware"

filter:
  quality_threshold: 0.65
  min_papers_per_day: 3
  max_papers_per_day: 12
  
  # 提高新鲜度权重
  scoring_weights:
    recency: 0.5           # 50%权重给新鲜度
    keyword_match: 0.3
    author_reputation: 0.1
    content_quality: 0.1

feishu:
  app_id: "test"
  app_secret: "test"
  document_folder: "AI论文日报"
  document_title: "AI硬件加速论文日报 - {date} (实时最新)"

debug:
  enabled: true
  dry_run: false  # 实际运行，非模拟
  mock_feishu: true  # 仍用模拟飞书，避免实际创建
